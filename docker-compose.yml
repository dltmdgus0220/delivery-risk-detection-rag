services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"] # DB 잘 켜졌는지 확인
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: ./api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api:/app
      - ./agents:/app/agents
      - ./rag:/app/rag
      # 로컬과 컨테이너 내부 동기화.

  dashboard:
    build:
      context: .
      dockerfile: ./dashboard/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./dashboard:/app

volumes:
  postgres_data:


# 로컬로 사용하기 위해 잠시 ports 5433:5432 로 변경. 배포 시 5432:5432 로 변경. 