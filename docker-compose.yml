# 배포용 (AWS EC2 + RDS)
# 실행: docker-compose -f docker-compose.prod.yml up -d
# DB: RDS PostgreSQL (DATABASE_URL은 Secrets Manager → .env 주입)

services:
  api:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/baemin-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  dashboard:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/baemin-dashboard:latest
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: always
